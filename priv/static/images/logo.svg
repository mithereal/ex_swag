<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .line {
        stroke: #111;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        }
    </style>

    <!-- Printer -->
    <rect x="40" y="40" width="120" height="50" rx="6" class="line"/>
    <rect x="55" y="25" width="90" height="20" rx="4" class="line"/>

    <!-- Paper coming out -->
    <rect x="65" y="90" width="70" height="40" rx="4" class="line"/>

    <!-- T-shirt outline -->
    <path d="M70 130
           L85 110
           L115 110
           L130 130
           L120 140
           L120 170
           L80 170
           L80 140 Z" class="line"/>

    <!-- Ink drop on shirt -->
    <path d="M100 125
           C95 135, 90 140, 100 150
           C110 140, 105 135, 100 125 Z" class="line"/>

    <!-- Ink droplets around -->
    <circle cx="30" cy="60" r="4" class="line"/>
    <circle cx="170" cy="60" r="4" class="line"/>
    <circle cx="50" cy="30" r="3" class="line"/>
    <circle cx="150" cy="30" r="3" class="line"/>
</svg>